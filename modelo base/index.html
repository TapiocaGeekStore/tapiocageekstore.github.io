<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpaceCommerce - Central de Comando</title>
    <style>
        /* Configurações Globais (Estilo Espacial Futurista) */
        :root {
            --bg-space: #0a0b10;
            --panel-bg: rgba(16, 20, 30, 0.75);
            --neon-blue: #00f3ff;
            --neon-purple: #9d4edd;
            --text-color: #e2e8f0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-space);
            background-image: 
                radial-gradient(white, rgba(255,255,255,.2) 2px, transparent 40px),
                radial-gradient(white, rgba(255,255,255,.15) 1px, transparent 30px);
            background-size: 550px 550px, 350px 350px;
            background-position: 0 0, 40px 60px;
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* HUD / Header da Nave */
        header {
            background: var(--panel-bg);
            border-bottom: 2px solid var(--neon-blue);
            padding: 20px;
            text-align: center;
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.2);
            backdrop-filter: blur(10px);
        }

        header h1 {
            font-size: 1.8rem;
            letter-spacing: 4px;
            color: var(--neon-blue);
            text-transform: uppercase;
            text-shadow: 0 0 10px var(--neon-blue);
        }

        header p {
            font-size: 0.9rem;
            color: #8a99ad;
            margin-top: 5px;
        }

        /* Container Principal (Layout Cockpit) */
        .container {
            display: flex;
            flex: 1;
            padding: 30px;
            gap: 30px;
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
        }

        /* Vitrine de Produtos (Painel Central) */
        .vitrine {
            flex: 3;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 25px;
        }

        /* Card de Produto (Módulo de Carga) */
        .card {
            background: var(--panel-bg);
            border: 1px solid rgba(0, 243, 255, 0.2);
            border-radius: 12px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(5px);
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 3px;
            background: linear-gradient(90deg, var(--neon-blue), var(--neon-purple));
            opacity: 0.7;
        }

        .card:hover {
            transform: translateY(-5px);
            border-color: var(--neon-blue);
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.4);
        }

        .card-img {
            height: 150px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem; /* Usando emoji para simplificar o modelo */
            margin-bottom: 15px;
            border: 1px dashed rgba(255,255,255,0.1);
        }

        .card-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 8px;
            color: #fff;
        }

        .card-desc {
            font-size: 0.85rem;
            color: #8a99ad;
            margin-bottom: 15px;
            line-height: 1.4;
        }

        .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: auto;
        }

        .price {
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--neon-blue);
        }

        .btn-add {
            background: transparent;
            border: 1px solid var(--neon-blue);
            color: var(--neon-blue);
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 1px;
            transition: all 0.2s ease;
        }

        .btn-add:hover {
            background: var(--neon-blue);
            color: var(--bg-space);
            box-shadow: 0 0 10px var(--neon-blue);
        }

        /* Painel Lateral (Computador de Bordo / Carrinho) */
        .sidebar {
            flex: 1;
            background: var(--panel-bg);
            border: 1px solid rgba(157, 78, 221, 0.3);
            border-radius: 12px;
            padding: 20px;
            max-height: 600px;
            display: flex;
            flex-direction: column;
            backdrop-filter: blur(10px);
        }

        .sidebar h2 {
            font-size: 1.1rem;
            text-transform: uppercase;
            color: var(--neon-purple);
            margin-bottom: 15px;
            letter-spacing: 2px;
            border-bottom: 1px solid rgba(157, 78, 221, 0.2);
            padding-bottom: 10px;
        }

        .carrinho-itens {
            flex: 1;
            overflow-y: auto;
            margin-bottom: 15px;
        }

        .item-carrinho {
            display: flex;
            justify-content: space-between;
            font-size: 0.9rem;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .item-carrinho span:last-child {
            color: var(--neon-blue);
        }

        .total-section {
            border-top: 1px solid rgba(157, 78, 221, 0.3);
            padding-top: 15px;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
        }

        .btn-checkout {
            background: linear-gradient(90deg, var(--neon-purple), #7b2cbf);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 6px;
            width: 100%;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: opacity 0.2s;
        }

        .btn-checkout:hover {
            opacity: 0.9;
            box-shadow: 0 0 15px var(--neon-purple);
        }

        /* Responsividade */
        @media (max-width: 900px) {
            .container {
                flex-direction: column;
            }
            .sidebar {
                max-height: none;
            }
        }
    </style>
</head>
<body>

    <header>
        <h1>Painel de Suprimentos Estelares</h1>
        <p>Status do Sistema: <span style="color: #00ff66;">Online</span> | Setor de Carga Disponível</p>
    </header>

    <div class="container">
        
        <main class="vitrine" id="vitrine-produtos">
            </main>

        <aside class="sidebar">
            <h2>Módulo de Carga</h2>
            <div class="carrinho-itens" id="carrinho-lista">
                <p style="color: #64748b; font-size: 0.85rem; text-align: center; margin-top: 20px;">Nenhum item na órbita de compra.</p>
            </div>
            <div class="total-section">
                <span>TOTAL:</span>
                <span id="total-preco">0.00 CRÉDITOS</span>
            </div>
            <button class="btn-checkout" onclick="finalizarMissao()">Iniciar Propulsão (Comprar)</button>
        </aside>

    </div>

    <script>
        // Dados dos produtos simulando um banco de dados cósmico
        const produtos = [
            { id: 1, nome: "Hiperpropulsor X-1", desc: "Aumente a velocidade de dobra da sua nave em até 4x.", preco: 1500, icone: "🚀" },
            { id: 2, nome: "Escudo de Plasma", desc: "Defesa máxima contra asteroides e lasers piratas.", preco: 850, icone: "🛡️" },
            { id: 3, nome: "Célula de Antimatéria", desc: "Combustível de alta densidade para viagens intergalácticas.", preco: 320, icone: "🔋" },
            { id: 4, nome: "Drone de Reparo", desc: "Manutenção automatizada para a fuselagem externa.", preco: 600, icone: "🤖" }
        ];

        let carrinho = [];

        // Função para renderizar os cards na tela de forma limpa
        function renderizarProdutos() {
            const vitrine = document.getElementById('vitrine-produtos');
            vitrine.innerHTML = '';

            produtos.forEach(prod => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div>
                        <div class="card-img">${prod.icone}</div>
                        <div class="card-title">${prod.nome}</div>
                        <div class="card-desc">${prod.desc}</div>
                    </div>
                    <div class="card-footer">
                        <span class="price">${prod.preco} CC</span>
                        <button class="btn-add" onclick="adicionarAoCarrinho(${prod.id})">Adquirir</button>
                    </div>
                `;
                vitrine.appendChild(card);
            });
        }

        // Função interativa para adicionar itens ao carrinho
        function adicionarAoCarrinho(id) {
            const produto = produtos.find(p => p.id === id);
            carrinho.push(produto);
            atualizarCarrinho();
        }

        // Atualiza a interface do Computador de Bordo (Carrinho)
        function atualizarCarrinho() {
            const lista = document.getElementById('carrinho-lista');
            const totalTxt = document.getElementById('total-preco');
            
            if (carrinho.length === 0) {
                lista.innerHTML = `<p style="color: #64748b; font-size: 0.85rem; text-align: center; margin-top: 20px;">Nenhum item na órbita de compra.</p>`;
                totalTxt.innerText = "0.00 CRÉDITOS";
                return;
            }

            lista.innerHTML = '';
            let total = 0;

            carrinho.forEach(item => {
                total += item.preco;
                const div = document.createElement('div');
                div.className = 'item-carrinho';
                div.innerHTML = `
                    <span>${item.nome}</span>
                    <span>${item.preco} CC</span>
                `;
                lista.appendChild(div);
            });

            totalTxt.innerText = `${total}.00 CRÉDITOS`;
        }

        // Ação final do botão de checkout
        function finalizarMissao() {
            if(carrinho.length === 0) {
                alert("Seu módulo de carga está vazio. Adicione suprimentos antes de decolar!");
                return;
            }
            alert("Missão iniciada! Seus créditos foram debitados e os produtos estão sendo teleportados para sua nave.");
            carrinho = [];
            atualizarCarrinho();
        }

        // Inicializa a página
        renderizarProdutos();
    </script>
</body>
</html>
