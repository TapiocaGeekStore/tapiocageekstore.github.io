<html lang="pt-br">
    <head>
        <title>TapiocaGeekStore</title>
        <meta charset="utf-8" />
        <link rel="icon" type="image/png" href="img/logotgs.png">
        <link rel="stylesheet" href="../Site/CSS/style.css">
        <style>
:root {
            --bg-space: #0a0b10;
            --panel-bg: rgba(16, 20, 30, 0.75);
            --neon-blue: #011aa7;
            --neon-purple: #f7ea33;
            --text-color: #e2e8f0;
        } 
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-space);
            background-image: 
                radial-gradient(white, rgba(255,255,255,.2) 2px, transparent 40px),
                radial-gradient(white, rgba(255,255,255,.15) 1px, transparent 30px);
            background-size: 550px 550px, 350px 350px;
            background-position: 0 0, 40px 60px;
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        header h1 {
            font-size: 1.8rem;
            letter-spacing: 4px;
            color: var(--neon-blue);
            text-transform: uppercase;
            text-shadow: 0 0 10px var(--neon-blue);
        }

        header p {
            font-size: 0.9rem;
            color: #8a99ad;
            margin-top: 5px;
        }

        .container {
            display: flex;
            flex: 1;
            padding: 30px;
            gap: 30px;
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
        }

        .vitrine {
            flex: 3;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 25px;
        }
        /*voltar para cá e inserir os cards*/

        .sidebar {
            flex: 1;
            background: var(--panel-bg);
            border: 1px solid rgba(157, 78, 221, 0.3);
            border-radius: 12px;
            padding: 20px;
            max-height: 600px;
            display: flex;
            flex-direction: column;
            backdrop-filter: blur(10px);
        }

        .sidebar h2 {
            font-size: 1.1rem;
            text-transform: uppercase;
            color: var(--neon-purple);
            margin-bottom: 15px;
            letter-spacing: 2px;
            border-bottom: 1px solid rgba(157, 78, 221, 0.2);
            padding-bottom: 10px;
        }

        .carrinho-itens {
            flex: 1;
            overflow-y: auto;
            margin-bottom: 15px;
        }

        .item-carrinho {
            display: flex;
            justify-content: space-between;
            font-size: 0.9rem;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .item-carrinho span:last-child {
            color: var(--neon-blue);
        }

        .total-section {
            border-top: 1px solid rgba(157, 78, 221, 0.3);
            padding-top: 15px;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
        }

        .btn-checkout {
            background: linear-gradient(90deg, var(--neon-purple), #7b2cbf);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 6px;
            width: 100%;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: opacity 0.2s;
        }

        .btn-checkout:hover {
            opacity: 0.9;
            box-shadow: 0 0 15px var(--neon-purple);
        }
        /* Responsividade */
        @media (max-width: 900px) {
            .container {
                flex-direction: column;
            }
            .sidebar {
                max-height: none;
            }
        }
           

          </style>
                
    </head>
    <header>
        <div class="topo">
        <h1><img src="img/logotapiocageekstore.png" alt="Logo da Página"></h1>
        <p>Status do Sistema: <span style="color: #00ff66;">Online</span> | Setor de Carga Disponível</p>
        </div>  
    
    </header>

    <body style="background-image: url('img/backgroudclean.png'); color: rgb(16, 3, 88);">
        <style>
            .texto-destaque {
                color: rgb(16, 3, 88);
            }
        </style>
       
      
        <h1 style="text-align: center;">
                    BEM VINDOS À UMA NOVA AVENTURA!
        </h1>
        <h2 style="text-align: center;">
            somos a tapioca Geek Store, o "cargueiro" loja mais rápido de toda galáxia.
        </h2>
        
            
        
        <p>
            Siga-nos no instagram:
            <a href="https://www.instagram.com/tapiocageekstore/" target="_blank">Página da Loja no Instagram</a>
        </p>     

    </body>
</html>
